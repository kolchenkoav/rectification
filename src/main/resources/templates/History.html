<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История расчетов - Ректификация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">История расчетов</h2>
            <div>
                <form th:action="@{/clear}" method="post" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите очистить всю историю?');">
                    <button type="submit" class="btn btn-outline-danger btn-lg me-2">
                        <i class="bi bi-trash me-2"></i>Очистить всё
                    </button>
                </form>
                <a href="/new" class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle me-2"></i>Новый расчет
                </a>
            </div>
        </div>

        <div class="card p-4">
            <div th:if="${#lists.isEmpty(history)}" class="text-center py-5">
                <p class="text-muted">История расчетов пуста. Сделайте свой первый расчет!</p>
            </div>
            
            <div th:if="${not #lists.isEmpty(history)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Спирт сырец (л)</th>
                            <th>Крепость (%)</th>
                            <th>Мощность (кВт)</th>
                            <th>Вода (мл)</th>
                            <th class="text-end">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${history}">
                            <td th:text="${#temporals.format(item.calculationDate, 'dd.MM.yyyy HH:mm')}"></td>
                            <td th:text="${item.amountOfRawAlcohol}"></td>
                            <td th:text="${item.alcoholStrength}"></td>
                            <td th:text="${item.power}"></td>
                            <td th:text="${item.water}"></td>
                            <td class="text-end">
                                <a th:href="@{'/view/' + ${item.id}}" class="btn btn-sm btn-outline-info me-1" title="Посмотреть">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <form th:action="@{'/delete/' + ${item.id}}" method="post" style="display: inline;">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить эту запись?')" title="Удалить">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
